project:
  name: MyProject
  ue_path: C:/UnrealEngine
  project_path: C:/Projects/MyProject
  project_name: MyProject
  svn_root: C:/Projects

targets:
  editor:
    type: editor
    build_type: development
  client:
    type: program
    name: MyClient
    build_type: shipping

actions:
  build_editor:
    steps:
      - uses: ue/build
        with:
          target: editor
  daily_check:
    steps:
      - uses: ue/update
      - uses: ue/build
        with:
          target: editor
