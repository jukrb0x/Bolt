project:
  name: MyProject
  engine_root: C:/UnrealEngine
  project_root: C:/Projects/MyProject
  project_name: MyProject
  engine_vcs: git
  project_vcs: svn

targets:
  editor:
    kind: editor
    config: debug
  client:
    kind: program
    name: MyClient
    config: shipping

actions:
  build_editor:
    steps:
      - uses: ue/build
        with:
          target: editor
          config: debug
  daily_check:
    steps:
      - uses: ue/update
      - uses: ue/build
        with:
          target: editor

ops:
  kill:
    default:
      - uses: ue/kill

  update:
    default:
      - uses: ue/update-git
      - uses: ue/update-svn
    git:
      - uses: ue/update-git
    svn:
      - uses: ue/update-svn

  svn-cleanup:
    default:
      - uses: ue/svn-cleanup

  generate-project:
    default:
      - uses: ue/generate-project

  build:
    default:
      - uses: ue/build
        with:
          target: editor

  fillddc:
    default:
      - uses: ue/fillddc

  start:
    default:
      - uses: ue/start

  info:
    default:
      - uses: ue/info

  fix-dll:
    default:
      - uses: ue/fix-dll

  build-engine:
    default:
      - uses: ue/build-engine
        with:
          config: development

  build-program:
    default:
      - uses: ue/build-program
        with:
          config: development
          platform: Win64

go-pipeline:
  order:
    - kill
    - info
    - update
    - svn-cleanup
    - generate-project
    - build-engine
    - build
    - build-program
    - fillddc
    - fix-dll
    - start
  fail_stops:
    - build
