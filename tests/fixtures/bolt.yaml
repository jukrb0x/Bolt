project:
  name: MyProject
  ue_path: C:/UnrealEngine
  project_path: C:/Projects/MyProject
  project_name: MyProject
  svn_root: C:/Projects

targets:
  editor:
    type: editor
    build_type: debug
  client:
    type: program
    name: MyClient
    build_type: shipping

actions:
  build_editor:
    steps:
      - uses: ue/build
        with:
          target: editor
  daily_check:
    steps:
      - uses: ue/update
      - uses: ue/build
        with:
          target: editor

ops:
  kill:
    default:
      - uses: ue/kill

  update:
    default:
      - uses: ue/update-git
      - uses: ue/update-svn
    git:
      - uses: ue/update-git
    svn:
      - uses: ue/update-svn

  svn-cleanup:
    default:
      - uses: ue/svn-cleanup

  generate-project:
    default:
      - uses: ue/generate-project

  build:
    default:
      - uses: ue/build
        with:
          target: editor

  fillddc:
    default:
      - uses: ue/fillddc

  start:
    default:
      - uses: ue/start

go-pipeline:
  order:
    - kill
    - update
    - svn-cleanup
    - generate-project
    - build
    - fillddc
    - start
  fail_stops:
    - build
