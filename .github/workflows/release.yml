name: Release

on:
  push:
    tags:
      - "v*"

# The local release script (scripts/release.ts) creates the GitHub release
# with the native binary for the releaser's platform and pushes the tag.
# This workflow runs on tag push and uploads the other platform's binary
# to the already-created release.

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install
      - name: Stamp version into src/version.ts
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          printf '// This file is overwritten by scripts/release.ts before compilation.\n// The VERSION constant is embedded in the binary.\nexport const VERSION = "%s";\n' "$VERSION" > src/version.ts
      - name: Build Windows binary
        run: bun build src/main.ts --compile --target=bun-windows-x64 --outfile=build/bolt-win-x64.exe
      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          gh release upload "$TAG" build/bolt-win-x64.exe --clobber

  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install
      - name: Stamp version into src/version.ts
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          printf '// This file is overwritten by scripts/release.ts before compilation.\n// The VERSION constant is embedded in the binary.\nexport const VERSION = "%s";\n' "$VERSION" > src/version.ts
      - name: Build macOS binary
        run: bun build src/main.ts --compile --target=bun-darwin-arm64 --outfile=build/bolt-mac-arm64
      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          gh release upload "$TAG" build/bolt-mac-arm64 --clobber
